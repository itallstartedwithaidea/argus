<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — ARGUS by googleadsagent.ai</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='38%25' cy='38%25'%3E%3Cstop offset='0%25' stop-color='%23f0a830'/%3E%3Cstop offset='100%25' stop-color='%23b07518'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='15' fill='url(%23g)'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.6/chart.umd.min.js"></script>
<style>
:root {
  --bg:#08080d;--bg2:#0e0e16;--bg3:#14141f;--surface:#1a1a2a;
  --border:#2a2a3a;--text:#e8e6e3;--text2:#9a9aaa;--text3:#686880;
  --amber:#f0a830;--amber2:#d4941a;--amber-dim:rgba(240,168,48,.08);
  --green:#4ade80;--blue:#60a5fa;--red:#f87171;--purple:#a78bfa;
  --font-mono:'JetBrains Mono','Courier New',monospace;
  --font-body:'IBM Plex Sans',-apple-system,sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:var(--amber);text-decoration:none}

.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.auth-box{width:100%;max-width:380px;text-align:center}
.auth-title{font-family:var(--font-mono);font-size:1.4rem;color:var(--amber);margin-bottom:4px}
.auth-sub{font-size:.85rem;color:var(--text3);margin-bottom:24px}
.auth-btn{width:100%;padding:14px;background:var(--amber);color:var(--bg);border:none;border-radius:8px;font-family:var(--font-mono);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.auth-btn:hover{background:var(--text)}

.dash{display:none;flex-direction:column;height:100vh}
.dash.active{display:flex}

.dash-top{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap;gap:8px}
.dash-brand{font-family:var(--font-mono);font-size:.9rem;color:var(--amber);font-weight:600}
.dash-brand-sub{font-family:var(--font-mono);font-size:.72rem;color:var(--text3);margin-left:8px}

.stats-row{display:flex;gap:8px;flex-wrap:wrap;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.stat-card{flex:1;min-width:100px;text-align:center;padding:10px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}
.stat-num{font-family:var(--font-mono);font-size:1.3rem;font-weight:700;color:var(--amber);line-height:1.2}
.stat-label{font-family:var(--font-mono);font-size:.62rem;color:var(--text3);letter-spacing:.5px;text-transform:uppercase}

.dash-body{display:flex;flex:1;overflow:hidden}

.dash-sidebar{width:180px;border-right:1px solid var(--border);padding:12px;flex-shrink:0;overflow-y:auto}
.tab-btn{width:100%;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-family:var(--font-mono);font-size:.76rem;cursor:pointer;text-align:left;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.tab-btn:hover{color:var(--amber);background:var(--amber-dim)}
.tab-btn.active{color:var(--amber);background:var(--amber-dim)}
.tab-count{font-size:.62rem;background:rgba(240,168,48,.15);color:var(--amber);padding:2px 8px;border-radius:10px}

.dash-main{display:flex;flex:1;overflow:hidden}

.list-panel{width:340px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.list-item{padding:12px 16px;border-bottom:1px solid rgba(42,42,58,.4);cursor:pointer;transition:background .15s}
.list-item:hover{background:rgba(42,42,58,.3)}
.list-item.selected{background:rgba(42,42,58,.5);border-left:3px solid var(--amber)}
.list-title{font-family:var(--font-mono);font-size:.78rem;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-meta{font-size:.68rem;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.list-badge{font-family:var(--font-mono);font-size:.6rem;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block}
.list-empty{padding:40px 16px;text-align:center;color:var(--text3);font-size:.82rem}

.detail-panel{flex:1;overflow-y:auto;padding:0}
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:.85rem}
.detail-scroll{padding:24px;max-width:800px}

.detail-section{margin-bottom:20px}
.detail-heading{font-family:var(--font-mono);font-size:.78rem;color:var(--amber);font-weight:600;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail-field{display:flex;gap:8px;margin-bottom:6px;font-size:.8rem}
.detail-field .label{color:var(--text3);min-width:100px;flex-shrink:0;font-family:var(--font-mono);font-size:.72rem}
.detail-field .value{color:var(--text2);word-break:break-all}
.detail-field .value a{color:var(--amber)}

.score-gauge{display:flex;align-items:center;gap:16px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px}
.gauge-num{font-family:var(--font-mono);font-size:2.8rem;font-weight:700;line-height:1}
.gauge-info .risk{font-family:var(--font-mono);font-size:.72rem;font-weight:600;letter-spacing:1px}
.gauge-info .sub{font-size:.68rem;color:var(--text3)}

.engine-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg2);border-radius:6px;margin-bottom:4px}
.engine-row .name{font-family:var(--font-mono);font-size:.76rem;color:var(--text);text-transform:capitalize}
.engine-row .summary{font-size:.68rem;color:var(--text3);margin-top:2px}
.engine-row .score{font-family:var(--font-mono);font-size:1.1rem;font-weight:700;flex-shrink:0}

.signal-chip{display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:.66rem;color:var(--text2);margin:2px 4px 2px 0}

.detect-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.detect-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.detect-label{font-family:var(--font-mono);font-size:.76rem;font-weight:600}
.detect-conf{font-family:var(--font-mono);font-size:.66rem;padding:2px 8px;border-radius:10px}
.detect-text{font-size:.78rem;color:var(--text2);line-height:1.5}

.notes-area{width:100%;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:.82rem;resize:vertical;min-height:60px}
.notes-area:focus{outline:none;border-color:var(--amber)}

.action-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.action-btn{flex:1;min-width:120px;padding:12px;border:none;border-radius:8px;font-family:var(--font-mono);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s}
.action-btn:disabled{opacity:.5;cursor:not-allowed}
.btn-analyze{background:var(--blue);color:#fff}
.btn-approve{background:var(--red);color:#fff}
.btn-reject{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.btn-publish{background:var(--amber);color:var(--bg)}

.analytics-panel{display:none;flex:1;overflow-y:auto;padding:24px;max-width:1200px}
.analytics-panel.active{display:block}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;margin-bottom:32px}
.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.chart-box h3{font-family:var(--font-mono);font-size:.78rem;color:var(--amber);font-weight:600;margin-bottom:14px;letter-spacing:.5px}
.chart-box canvas{width:100%!important;max-height:280px}

.group-section{margin-bottom:28px}
.group-section h3{font-family:var(--font-mono);font-size:.82rem;color:var(--amber);font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.group-table{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.group-table th{padding:10px 14px;text-align:left;font-family:var(--font-mono);font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;background:var(--bg3);border-bottom:1px solid var(--border)}
.group-table td{padding:10px 14px;font-size:.78rem;color:var(--text2);border-bottom:1px solid rgba(42,42,58,.3)}
.group-table tr:hover td{background:rgba(42,42,58,.2)}
.group-table .count-badge{font-family:var(--font-mono);display:inline-block;background:var(--amber-dim);color:var(--amber);padding:2px 10px;border-radius:10px;font-size:.72rem;font-weight:600}
.group-table .score-cell{font-family:var(--font-mono);font-weight:600}

.comment-row{display:flex;gap:10px;padding:8px 12px;border-bottom:1px solid rgba(42,42,58,.3);align-items:flex-start}
.comment-row:last-child{border-bottom:none}
.comment-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.68rem;color:var(--amber);font-weight:600;flex-shrink:0}
.comment-body{flex:1;min-width:0}
.comment-user{font-family:var(--font-mono);font-size:.72rem;color:var(--amber);font-weight:500}
.comment-text{font-size:.76rem;color:var(--text2);line-height:1.5;margin-top:2px}
.comment-badge{font-family:var(--font-mono);font-size:.6rem;padding:2px 8px;border-radius:10px;font-weight:600;flex-shrink:0;margin-top:4px}

.kpi-row{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.kpi-card{flex:1;min-width:140px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;text-align:center}
.kpi-val{font-family:var(--font-mono);font-size:2rem;font-weight:700;line-height:1.2}
.kpi-label{font-family:var(--font-mono);font-size:.62rem;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-top:4px}

.tab-btn .tab-icon{margin-right:6px}

@media(max-width:900px){
  .dash-sidebar{display:none}
  .list-panel{width:100%}
  .dash-main{flex-direction:column}
  .detail-panel{border-top:1px solid var(--border)}
  .chart-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .stats-row{gap:4px}.stat-card{min-width:70px;padding:6px 8px}
  .stat-num{font-size:1rem}
  .list-panel{width:100%}
  .kpi-card{min-width:100px}
}
</style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-title">ARGUS</div>
    <div class="auth-sub">Admin Dashboard</div>
    <div id="authStatus" style="font-size:.82rem;color:var(--text3);margin-bottom:16px;">Checking session...</div>
    <button class="auth-btn" id="googleSignIn" onclick="startOAuth()" style="display:none;">Sign in with Google</button>
    <div id="authError" style="display:none;margin-top:12px;font-size:.8rem;color:var(--red);"></div>
  </div>
</div>

<div class="dash" id="dashboard">
  <div class="dash-top">
    <div><span class="dash-brand">ARGUS</span><span class="dash-brand-sub">Admin Dashboard</span></div>
    <div style="font-family:var(--font-mono);font-size:.7rem;color:var(--text3);" id="userInfo"></div>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-num" id="statTotal">-</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num" id="statQueued">-</div><div class="stat-label">Queued</div></div>
    <div class="stat-card"><div class="stat-num" id="statAnalyzed">-</div><div class="stat-label">Analyzed</div></div>
    <div class="stat-card"><div class="stat-num" id="statPublished">-</div><div class="stat-label">Published</div></div>
    <div class="stat-card"><div class="stat-num" id="statRejected">-</div><div class="stat-label">Rejected</div></div>
    <div class="stat-card"><div class="stat-num" id="statDisputes">-</div><div class="stat-label">Disputes</div></div>
  </div>

  <div class="dash-body">
    <div class="dash-sidebar">
      <button class="tab-btn active" data-tab="queue" onclick="switchTab('queue')">Queue <span class="tab-count" id="queueTabCount">0</span></button>
      <button class="tab-btn" data-tab="disputes" onclick="switchTab('disputes')">Disputes <span class="tab-count" id="disputesTabCount">0</span></button>
      <div style="border-top:1px solid var(--border);margin:8px 0;"></div>
      <button class="tab-btn" data-tab="analytics" onclick="switchTab('analytics')">Analytics</button>
      <button class="tab-btn" data-tab="grouping" onclick="switchTab('grouping')">Grouping</button>
    </div>
    <div class="dash-main">
      <div class="list-panel" id="listPanel"></div>
      <div class="detail-panel" id="detailPanel"><div class="detail-empty">Select an item to review</div></div>
      <div class="analytics-panel" id="analyticsPanel"></div>
    </div>
  </div>
</div>

<script>
var API = '/api/argus';
var ADMIN_EMAIL = 'john@itallstartedwithaidea.com';
var sessionId = '';
var currentTab = 'queue';
var queue = [];
var disputes = [];
var selected = null;
var statsData = null;
var chartInstances = {};

function startOAuth() {
  window.location.href = '/api/auth?action=login&return_url=' + encodeURIComponent('/tools/argus/admin.html');
}

function showAuthError(msg) {
  document.getElementById('authError').textContent = msg;
  document.getElementById('authError').style.display = 'block';
  document.getElementById('googleSignIn').style.display = 'block';
  document.getElementById('authStatus').style.display = 'none';
}

(function checkAuth() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('auth_success') === '1' && params.get('session_id')) {
    sessionId = params.get('session_id');
    localStorage.setItem('argus_admin_session', sessionId);
    window.history.replaceState({}, '', window.location.pathname);
  } else {
    sessionId = localStorage.getItem('argus_admin_session') || '';
  }

  if (!sessionId) {
    document.getElementById('authStatus').style.display = 'none';
    document.getElementById('googleSignIn').style.display = 'block';
    return;
  }

  fetch('/api/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'status', sessionId: sessionId })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (!data.connected) { localStorage.removeItem('argus_admin_session'); showAuthError('Session expired.'); return; }
    if (data.email !== ADMIN_EMAIL) { localStorage.removeItem('argus_admin_session'); showAuthError('Access denied. Signed in as: ' + (data.email || 'unknown')); return; }
    document.getElementById('userInfo').textContent = data.email;
    enterDashboard();
  }).catch(function() { showAuthError('Could not verify session.'); });
})();

function enterDashboard() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  fetchStats();
  fetchQueue();
  fetchDisputes();
}

function api(path, opts) {
  opts = opts || {};
  opts.headers = Object.assign({ 'Content-Type': 'application/json', 'X-Session-Id': sessionId }, opts.headers || {});
  return fetch(path, opts).then(function(r) { return r.json(); });
}

function fetchStats() {
  api(API + '?action=stats').then(function(d) {
    statsData = d;
    document.getElementById('statTotal').textContent = d.total || 0;
    document.getElementById('statQueued').textContent = d.queued || 0;
    document.getElementById('statAnalyzed').textContent = d.analyzed || 0;
    document.getElementById('statPublished').textContent = d.published || 0;
    document.getElementById('statRejected').textContent = d.rejected || 0;
    document.getElementById('statDisputes').textContent = d.disputes || 0;
    if (currentTab === 'analytics') renderAnalytics();
    if (currentTab === 'grouping') renderGrouping();
  });
}

function fetchQueue() {
  api(API + '?action=queue').then(function(d) {
    queue = d.submissions || [];
    document.getElementById('queueTabCount').textContent = queue.length;
    if (currentTab === 'queue') renderList();
  }).catch(function() { queue = []; renderList(); });
}

function fetchDisputes() {
  api(API + '?action=disputes').then(function(d) {
    disputes = d.disputes || [];
    document.getElementById('disputesTabCount').textContent = disputes.length;
    if (currentTab === 'disputes') renderList();
  }).catch(function() { disputes = []; renderList(); });
}

function switchTab(tab) {
  currentTab = tab;
  selected = null;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === tab); });

  var listPanel = document.getElementById('listPanel');
  var detailPanel = document.getElementById('detailPanel');
  var analyticsPanel = document.getElementById('analyticsPanel');

  if (tab === 'analytics' || tab === 'grouping') {
    listPanel.style.display = 'none';
    detailPanel.style.display = 'none';
    analyticsPanel.classList.add('active');
    if (tab === 'analytics') renderAnalytics();
    else renderGrouping();
  } else {
    listPanel.style.display = '';
    detailPanel.style.display = '';
    analyticsPanel.classList.remove('active');
    renderList();
    detailPanel.innerHTML = '<div class="detail-empty">Select an item to review</div>';
  }
}

function sc(score) { return score <= 25 ? '#dc2626' : score <= 40 ? '#ea580c' : score <= 60 ? '#d97706' : '#16a34a'; }
function rl(score) { return score <= 25 ? 'CRITICAL' : score <= 40 ? 'HIGH' : score <= 60 ? 'MEDIUM' : 'LOW'; }
function statusColor(s) { return { queued:'var(--text3)', analyzing:'var(--blue)', analyzed:'var(--purple)', published:'var(--green)', rejected:'var(--red)' }[s] || 'var(--text3)'; }

function renderList() {
  var items = currentTab === 'queue' ? queue : disputes;
  var panel = document.getElementById('listPanel');

  if (items.length === 0) {
    panel.innerHTML = '<div class="list-empty">' + (currentTab === 'queue' ? 'No submissions yet' : 'No disputes') + '</div>';
    return;
  }

  var html = '';
  items.forEach(function(item, i) {
    var isSel = selected && selected.id === item.id;
    if (currentTab === 'queue') {
      var urlShort = (item.input_url || '').replace(/^https?:\/\/(www\.)?/, '').slice(0, 45);
      var hasScore = item.analysis && item.analysis.trust_score != null;
      var scoreBadge = hasScore ? '<span class="list-badge" style="background:' + sc(item.analysis.trust_score) + '20;color:' + sc(item.analysis.trust_score) + '">' + item.analysis.trust_score + '</span>' : '';
      var statusBadge = '<span class="list-badge" style="background:' + statusColor(item.status) + '20;color:' + statusColor(item.status) + '">' + item.status + '</span>';
      html += '<div class="list-item' + (isSel ? ' selected' : '') + '" onclick="selectItem(' + i + ')">' +
        '<div class="list-title">' + urlShort + '</div>' +
        '<div class="list-meta">' + statusBadge + scoreBadge +
        '<span>' + (item.platform || '') + '</span>' +
        '<span>' + new Date(item.created_at).toLocaleDateString() + '</span></div></div>';
    } else {
      html += '<div class="list-item' + (isSel ? ' selected' : '') + '" onclick="selectItem(' + i + ')">' +
        '<div class="list-title">' + (item.claimant_name || 'Unknown') + '</div>' +
        '<div class="list-meta"><span class="list-badge" style="background:var(--red)20;color:var(--red)">' + (item.dispute_type || '') + '</span>' +
        '<span>' + new Date(item.created_at).toLocaleDateString() + '</span></div></div>';
    }
  });
  panel.innerHTML = html;
}

function selectItem(i) {
  selected = (currentTab === 'queue' ? queue : disputes)[i];
  renderList();
  renderDetail();
}

function renderDetail() {
  var panel = document.getElementById('detailPanel');
  if (!selected) { panel.innerHTML = '<div class="detail-empty">Select an item to review</div>'; return; }

  var h = '<div class="detail-scroll">';

  if (currentTab === 'queue') {
    h += renderSubmissionDetail(selected);
  } else {
    h += renderDisputeDetail(selected);
  }

  h += '</div>';
  panel.innerHTML = h;
}

function renderSubmissionDetail(s) {
  var h = '';
  var a = s.analysis;

  // URL & Platform
  h += '<div class="detail-section"><div class="detail-heading">Submission</div>';
  h += field('URL', '<a href="' + esc(s.input_url) + '" target="_blank" rel="noopener">' + esc(s.input_url) + '</a>');
  h += field('Type', s.input_type || 'profile');
  h += field('Platform', s.platform || 'Unknown');
  h += field('Status', '<span style="color:' + statusColor(s.status) + ';font-weight:600">' + s.status + '</span>');
  h += field('Submitted', new Date(s.created_at).toLocaleString());
  if (s.reason) h += field('Reason', esc(s.reason));
  h += '</div>';

  // Submitter info
  h += '<div class="detail-section"><div class="detail-heading">Submitter</div>';
  h += field('Email', s.submitter_email || 'Anonymous');
  h += field('IP', s.ip || '?');
  h += field('Location', [s.city, s.region, s.country].filter(Boolean).join(', ') || '?');
  if (s.timezone) h += field('Timezone', s.timezone);
  if (s.asn) h += field('ASN', s.asn);
  if (s.ua) h += field('User Agent', '<span style="font-size:.68rem;word-break:break-all">' + esc(s.ua) + '</span>');
  h += '</div>';

  if (a) {
    // Score
    h += '<div class="score-gauge">';
    h += '<div class="gauge-num" style="color:' + sc(a.trust_score) + '">' + a.trust_score + '</div>';

    // Scoring breakdown
    if (a.scoring) {
      h += '<div class="detail-section"><div class="detail-heading">Score Breakdown</div>';
      h += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;">';
      h += '<div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap">';
      h += '<div style="flex:1;min-width:80px;text-align:center"><div style="font-family:var(--font-mono);font-size:.68rem;color:var(--text3)">Composite</div><div style="font-family:var(--font-mono);font-size:1.1rem;font-weight:700;color:var(--blue)">' + a.scoring.weighted_composite + '</div></div>';
      h += '<div style="flex:1;min-width:80px;text-align:center"><div style="font-family:var(--font-mono);font-size:.68rem;color:var(--text3)">Penalties</div><div style="font-family:var(--font-mono);font-size:1.1rem;font-weight:700;color:var(--red)">-' + a.scoring.total_penalty + '</div></div>';
      h += '<div style="flex:1;min-width:80px;text-align:center"><div style="font-family:var(--font-mono);font-size:.68rem;color:var(--text3)">Final</div><div style="font-family:var(--font-mono);font-size:1.1rem;font-weight:700;color:' + sc(a.trust_score) + '">' + a.trust_score + '</div></div>';

        h += '<div style="flex:1;min-width:80px;text-align:center"><div style="font-family:var(--font-mono);font-size:.68rem;color:var(--text3)">Claude Raw</div><div style="font-family:var(--font-mono);font-size:1.1rem;font-weight:700;color:var(--text3)">' + a.claude_raw_score + '</div></div>';
      }
      h += '</div>';
      if (a.scoring.penalties && a.scoring.penalties.length > 0) {
        h += '<div style="font-family:var(--font-mono);font-size:.66rem;color:var(--text3);margin-bottom:6px">PENALTIES APPLIED:</div>';

          h += '<div style="display:flex;justify-content:space-between;padding:3px 8px;font-size:.72rem;border-bottom:1px solid rgba(42,42,58,.3)">';
          h += '<span style="color:var(--text2)">' + esc(p.reason) + '</span>';
          h += '<span style="color:var(--red);font-family:var(--font-mono);font-weight:600">-' + p.amount + '</span>';
          h += '</div>';
        });
      }
      h += '</div></div>';
    }

    // Verdict
    h += '<div class="detail-section"><div class="detail-heading">Verdict</div>';
    h += '<div style="color:var(--text);font-size:.88rem;line-height:1.6;background:var(--bg2);padding:14px;border-radius:8px;">' + esc(a.verdict) + '</div></div>';

    // Engines
    h += '<div class="detail-section"><div class="detail-heading">Detection Engines</div>';
    ['image', 'text', 'behavioral', 'network'].forEach(function(eng) {
      var e = a.engines && a.engines[eng];
      if (!e) return;
      h += '<div class="engine-row"><div><div class="name">' + eng + '</div><div class="summary">' + esc(e.summary || '') + '</div>';
      if (e.signals && e.signals.length) {
        h += '<div style="margin-top:4px">';
        e.signals.forEach(function(sig) {
          h += '<span class="signal-chip" style="border-color:' + sc(sig.risk === 'critical' ? 0 : sig.risk === 'high' ? 30 : sig.risk === 'medium' ? 50 : 80) + '40">' + esc(sig.name) + ': ' + esc(sig.value) + '</span>';
        });
        h += '</div>';
      }
      h += '</div><div class="score" style="color:' + sc(e.score) + '">' + e.score + '</div></div>';
    });
    h += '</div>';

    // Bot detection
    if (a.bot_detection) {
      h += detectionCard('Bot Detection', a.bot_detection.is_bot_likely, a.bot_detection.confidence, a.bot_detection.detail, a.bot_detection.indicators);
    }
    if (a.ai_content) {
      h += detectionCard('AI Content', a.ai_content.is_ai_likely, a.ai_content.confidence, a.ai_content.detail, a.ai_content.indicators);
    }
    if (a.fake_engagement && a.fake_engagement.detected) {
      h += detectionCard('Fake Engagement', true, a.fake_engagement.confidence, a.fake_engagement.detail, a.fake_engagement.indicators);
    }

    // Comments analysis
    if (a.comments_analysis && a.comments_analysis.total_visible > 0) {
      h += '<div class="detail-section"><div class="detail-heading">Comments Analysis (' + a.comments_analysis.total_visible + ' analyzed)</div>';
      h += '<div style="display:flex;gap:12px;margin-bottom:10px;">';
      h += '<div style="background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:8px;padding:8px 14px;text-align:center;flex:1"><div style="font-family:var(--font-mono);font-size:1.2rem;font-weight:700;color:var(--green)">' + (a.comments_analysis.authentic_count || 0) + '</div><div style="font-size:.62rem;color:var(--text3)">Authentic</div></div>';
      h += '<div style="background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:8px 14px;text-align:center;flex:1"><div style="font-family:var(--font-mono);font-size:1.2rem;font-weight:700;color:var(--red)">' + (a.comments_analysis.suspicious_count || 0) + '</div><div style="font-size:.62rem;color:var(--text3)">Suspicious</div></div>';
      h += '</div>';
      if (a.comments_analysis.overall_assessment) {
        h += '<div style="color:var(--text2);font-size:.78rem;line-height:1.6;background:var(--bg2);padding:12px;border-radius:8px;margin-bottom:10px">' + esc(a.comments_analysis.overall_assessment) + '</div>';
      }
      if (a.comments_analysis.comments && a.comments_analysis.comments.length) {
        h += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;max-height:300px;overflow-y:auto">';
        a.comments_analysis.comments.forEach(function(c) {
          var susp = c.is_suspicious;
          h += '<div class="comment-row">';
          h += '<div class="comment-avatar">' + esc((c.username || '?')[0].toUpperCase()) + '</div>';
          h += '<div class="comment-body"><div class="comment-user">' + esc(c.username) + '</div><div class="comment-text">' + esc(c.summary) + '</div>';
          if (c.suspicion_reason) h += '<div style="font-size:.66rem;color:var(--red);margin-top:2px">' + esc(c.suspicion_reason) + '</div>';
          h += '</div>';
          h += '<span class="comment-badge" style="background:' + (susp ? 'rgba(248,113,113,.12);color:var(--red)' : 'rgba(74,222,128,.12);color:var(--green)') + '">' + (susp ? 'Suspicious' : 'OK') + '</span>';
          h += '</div>';
        });
        h += '</div>';
      }
      h += '</div>';
    }

    // Poster profile
    if (a.poster_profile && a.poster_profile.username) {
      h += '<div class="detail-section"><div class="detail-heading">Poster Profile</div>';
      h += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px">';
      h += field('Username', '<span style="color:var(--amber);font-weight:600">' + esc(a.poster_profile.username) + '</span>');
      if (a.poster_profile.profile_url) h += field('Profile', '<a href="' + esc(a.poster_profile.profile_url) + '" target="_blank">' + esc(a.poster_profile.profile_url) + '</a>');
      if (a.poster_profile.account_indicators) h += field('Account', esc(a.poster_profile.account_indicators));
      if (a.poster_profile.posting_history_notes) h += field('History', esc(a.poster_profile.posting_history_notes));
      h += '</div></div>';
    }

    // Detailed analysis
    h += '<div class="detail-section"><div class="detail-heading">Full Analysis</div>';
    h += '<div style="color:var(--text2);font-size:.8rem;line-height:1.7;background:var(--bg2);padding:14px;border-radius:8px;white-space:pre-wrap;max-height:300px;overflow-y:auto;">' + esc(a.detailed_analysis) + '</div></div>';

    // Published link
    if (s.status === 'published' && s.published_url) {
      h += '<div class="detail-section"><div class="detail-heading">Published</div>';
      h += '<div style="background:rgba(74,222,128,.05);border:1px solid rgba(74,222,128,.2);border-radius:8px;padding:14px;">';
      h += '<div style="color:var(--green);font-family:var(--font-mono);font-size:.78rem;margin-bottom:6px;">Published ' + new Date(s.approved_at).toLocaleString() + '</div>';
      h += '<a href="' + esc(s.published_url) + '" target="_blank" style="color:var(--amber);font-size:.82rem;">' + esc(s.published_url) + '</a>';
      if (s.email_sent) h += '<div style="color:var(--text3);font-size:.68rem;margin-top:6px;">Email sent to ' + esc(s.submitter_email) + ' at ' + new Date(s.email_sent_at).toLocaleString() + '</div>';
      h += '</div></div>';
    }
  }

  // Actions
  h += '<div class="detail-section"><div class="detail-heading">Actions</div>';
  h += '<textarea class="notes-area" id="adminNote" rows="2" placeholder="Admin notes (optional)...">' + esc(s.admin_notes || '') + '</textarea>';
  h += '<div class="action-row">';

  if (s.status === 'queued') {
    h += '<button class="action-btn btn-analyze" onclick="runAnalysis(\'' + s.id + '\')">Analyze with Claude</button>';
    h += '<button class="action-btn btn-reject" onclick="rejectSub(\'' + s.id + '\')">Reject</button>';
  } else if (s.status === 'analyzed') {
    h += '<button class="action-btn btn-publish" onclick="approveSub(\'' + s.id + '\')">Approve &amp; Publish</button>';
    h += '<button class="action-btn btn-analyze" onclick="runAnalysis(\'' + s.id + '\')">Re-Analyze</button>';
    h += '<button class="action-btn btn-reject" onclick="rejectSub(\'' + s.id + '\')">Reject</button>';
  } else if (s.status === 'published') {
    h += '<button class="action-btn btn-analyze" onclick="runAnalysis(\'' + s.id + '\')">Re-Analyze</button>';
  }

  h += '</div></div>';
  return h;
}

function renderDisputeDetail(d) {
  var h = '<div class="detail-section"><div class="detail-heading">Claimant</div>';
  h += field('Name', esc(d.claimant_name));
  h += field('Email', esc(d.claimant_email));
  h += field('Type', esc(d.dispute_type));
  h += field('Status', d.status);
  h += field('Filed', new Date(d.created_at).toLocaleString());
  h += '</div>';

  if (d.profile_url) {
    h += '<div class="detail-section"><div class="detail-heading">Subject</div>';
    h += field('URL', '<a href="' + esc(d.profile_url) + '" target="_blank">' + esc(d.profile_url) + '</a>');
    if (d.platform) h += field('Platform', d.platform);
    if (d.handle) h += field('Handle', d.handle);
    h += '</div>';
  }

  h += '<div class="detail-section"><div class="detail-heading">Reason</div>';
  h += '<div style="color:var(--text2);font-size:.82rem;background:var(--bg2);padding:14px;border-radius:8px;line-height:1.6;">' + esc(d.reason) + '</div></div>';

  if (d.evidence_notes) {
    h += '<div class="detail-section"><div class="detail-heading">Evidence</div>';
    h += '<div style="color:var(--text2);font-size:.82rem;background:var(--bg2);padding:14px;border-radius:8px;line-height:1.6;">' + esc(d.evidence_notes) + '</div></div>';
  }

  h += '<div class="detail-section"><div class="detail-heading">Resolution</div>';
  h += '<textarea class="notes-area" id="adminNote" rows="3" placeholder="Resolution notes..."></textarea>';
  h += '<div class="action-row">';
  h += '<button class="action-btn btn-reject" style="color:var(--green)" onclick="resolveDispute(\'' + d.id + '\',\'approved\')">Approve Dispute</button>';
  h += '<button class="action-btn btn-approve" onclick="resolveDispute(\'' + d.id + '\',\'rejected\')">Reject Dispute</button>';
  h += '</div></div>';

  return h;
}

function field(label, value) {
  return '<div class="detail-field"><span class="label">' + label + '</span><span class="value">' + value + '</span></div>';
}

function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

function detectionCard(title, detected, confidence, detail, indicators) {
  var color = detected ? 'var(--red)' : 'var(--green)';
  var bg = detected ? 'rgba(248,113,113,.06)' : 'rgba(74,222,128,.06)';
  var h = '<div class="detect-card" style="border-color:' + color + '30">';
  h += '<div class="detect-header"><span class="detect-label" style="color:' + color + '">' + title + '</span>';
  h += '<span class="detect-conf" style="background:' + bg + ';color:' + color + '">' + (confidence || 0) + '% conf</span></div>';
  h += '<div class="detect-text">' + esc(detail || '') + '</div>';
  if (indicators && indicators.length) {
    h += '<div style="margin-top:8px">';
    indicators.forEach(function(ind) { h += '<span class="signal-chip">' + esc(ind) + '</span>'; });
    h += '</div>';
  }
  h += '</div>';
  return h;
}

// ── Actions ──

function getApiKey() {
  try {
    var keys = JSON.parse(localStorage.getItem('buddy_keys') || '{}');
    if (keys.keyAnthropic) return keys.keyAnthropic;
  } catch {}
  try {
    var argusKey = localStorage.getItem('argus_api_key');
    if (argusKey) return argusKey;
  } catch {}
  return null;
}

function promptForKey() {
  var key = prompt('Enter your Anthropic API key (sk-ant-...).\nThis is the same key you use in the Auditor tool.\nIt will be saved for future ARGUS analyses.');
  if (key && key.startsWith('sk-ant-')) {
    localStorage.setItem('argus_api_key', key);
    try {
      var keys = JSON.parse(localStorage.getItem('buddy_keys') || '{}');
      keys.keyAnthropic = key;
      localStorage.setItem('buddy_keys', JSON.stringify(keys));
    } catch {}
    return key;
  }
  return null;
}

function runAnalysis(id) {
  var btn = event.target;
  var apiKey = getApiKey();
  if (!apiKey) {
    apiKey = promptForKey();
    if (!apiKey) return;
  }
  btn.disabled = true;
  btn.textContent = 'Analyzing...';

  api(API + '?action=analyze', {
    method: 'POST',
    body: JSON.stringify({ submission_id: id, api_key: apiKey })
  }).then(function(data) {
    if (data.error) { alert('Error: ' + data.error); btn.disabled = false; btn.textContent = 'Analyze with Claude'; return; }
    if (data.submission) {
      var idx = queue.findIndex(function(q) { return q.id === id; });
      if (idx >= 0) queue[idx] = data.submission;
      selected = data.submission;
      renderList();
      renderDetail();
      fetchStats();
    }
  }).catch(function(e) { alert('Analysis failed: ' + e.message); btn.disabled = false; btn.textContent = 'Analyze with Claude'; });
}

function approveSub(id) {
  var btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Publishing...';
  var notes = document.getElementById('adminNote') ? document.getElementById('adminNote').value : '';

  api(API + '?action=approve', {
    method: 'POST',
    body: JSON.stringify({ submission_id: id, admin_notes: notes })
  }).then(function(data) {
    if (data.error) { alert('Error: ' + data.error); btn.disabled = false; btn.textContent = 'Approve & Publish'; return; }
    if (data.published_url) {
      alert('Published: ' + data.published_url + (data.email_sent ? '\nEmail sent to submitter.' : ''));
    }
    fetchQueue();
    fetchStats();
    selected = null;
    renderDetail();
  }).catch(function() { btn.disabled = false; btn.textContent = 'Approve & Publish'; });
}

function rejectSub(id) {
  var notes = document.getElementById('adminNote') ? document.getElementById('adminNote').value : '';
  api(API + '?action=reject', {
    method: 'POST',
    body: JSON.stringify({ submission_id: id, reason: notes })
  }).then(function() {
    fetchQueue();
    fetchStats();
    selected = null;
    renderDetail();
  });
}

function resolveDispute(id, resolution) {
  var notes = document.getElementById('adminNote') ? document.getElementById('adminNote').value : '';
  var btns = document.querySelectorAll('.action-btn');
  btns.forEach(function(b) { b.disabled = true; });

  api(API + '?action=dispute_resolve', {
    method: 'POST',
    body: JSON.stringify({ dispute_id: id, resolution: resolution, resolution_note: notes })
  }).then(function() {
    fetchDisputes();
    fetchStats();
    selected = null;
    renderDetail();
  }).catch(function() { btns.forEach(function(b) { b.disabled = false; }); });
}

// ── Analytics ──

function destroyCharts() {
  Object.keys(chartInstances).forEach(function(k) {
    if (chartInstances[k]) { chartInstances[k].destroy(); delete chartInstances[k]; }
  });
}

function makeChart(canvasId, config) {
  if (chartInstances[canvasId]) chartInstances[canvasId].destroy();
  var ctx = document.getElementById(canvasId);
  if (!ctx) return;
  Chart.defaults.color = '#9a9aaa';
  Chart.defaults.borderColor = '#2a2a3a';
  Chart.defaults.font.family = "'JetBrains Mono', monospace";
  Chart.defaults.font.size = 11;
  chartInstances[canvasId] = new Chart(ctx, config);
}

    }

    // Timeline line chart
    if (c.timeline && Object.keys(c.timeline).length > 0) {
      var tDates = Object.keys(c.timeline).sort();
      makeChart('chartTimeline', {
        type: 'line',
        data: {
          labels: tDates,
          datasets: [{
            label: 'Submissions',
            data: tDates.map(function(d) { return c.timeline[d]; }),
            borderColor: '#f0a830',
            backgroundColor: 'rgba(240,168,48,.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 4,
            pointHoverRadius: 7,
            pointBackgroundColor: '#f0a830'
          }]
        },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
      });
    }
  }, 50);
}

// ── Grouping ──

function renderGrouping() {
  destroyCharts();
  var panel = document.getElementById('analyticsPanel');
  if (!statsData || !statsData.grouping) {
    panel.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3)">Loading grouping data...</div>';
    return;
  }
  var g = statsData.grouping;
  var h = '<h2 style="font-family:var(--font-mono);font-size:1rem;color:var(--amber);margin-bottom:20px">Submission Grouping</h2>';

  // Repeat posters (subject)
  if (g.subjectPosters && Object.keys(g.subjectPosters).length > 0) {
    var posters = Object.entries(g.subjectPosters).sort(function(a, b) { return b[1].count - a[1].count; });
    h += '<div class="group-section"><h3>Repeat Posters (Subject of Analysis)</h3>';
    h += '<p style="color:var(--text3);font-size:.78rem;margin-bottom:12px">Usernames that appear in multiple submissions — may indicate serial offenders.</p>';
    h += '<table class="group-table"><thead><tr><th>Poster</th><th>Times Reported</th><th>Platforms</th><th>Avg Score</th><th>Submissions</th></tr></thead><tbody>';
    posters.forEach(function(p) {
      var name = p[0];
      var data = p[1];
      var platforms = [];
      var totalScore = 0;
      var scoreCount = 0;
      data.submissions.forEach(function(s) {
        if (s.platform && platforms.indexOf(s.platform) === -1) platforms.push(s.platform);
        if (s.score != null) { totalScore += s.score; scoreCount++; }
      });
      var avg = scoreCount > 0 ? Math.round(totalScore / scoreCount) : null;
      h += '<tr>';
      h += '<td style="font-family:var(--font-mono);color:var(--amber);font-weight:600">' + esc(name) + '</td>';
      h += '<td><span class="count-badge">' + data.count + '</span></td>';
      h += '<td>' + platforms.map(function(p) { return '<span style="font-size:.68rem;background:var(--bg3);padding:2px 6px;border-radius:4px;margin-right:4px">' + esc(p) + '</span>'; }).join('') + '</td>';
      h += '<td class="score-cell"' + (avg != null ? ' style="color:' + sc(avg) + '"' : '') + '>' + (avg != null ? avg : '—') + '</td>';
      h += '<td>' + data.submissions.map(function(s) { return '<a href="#" onclick="jumpToSubmission(\'' + s.id + '\');return false" style="font-size:.68rem;margin-right:6px;color:var(--blue)">' + (s.url || '').replace(/^https?:\/\/(www\.)?/, '').slice(0, 25) + '</a>'; }).join('') + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  } else {
    h += '<div class="group-section"><h3>Repeat Posters</h3><p style="color:var(--text3);font-size:.82rem">No repeat posters detected yet. Posters will be grouped as more submissions are analyzed.</p></div>';
  }

  // Submitters
  if (g.submitters && Object.keys(g.submitters).length > 0) {
    var subs = Object.entries(g.submitters).sort(function(a, b) { return b[1].count - a[1].count; });
    h += '<div class="group-section"><h3>Submitter Activity</h3>';
    h += '<p style="color:var(--text3);font-size:.78rem;margin-bottom:12px">People who submitted content for analysis, grouped by email/IP.</p>';
    h += '<table class="group-table"><thead><tr><th>Submitter</th><th>Submissions</th><th>Statuses</th><th>Details</th></tr></thead><tbody>';
    subs.slice(0, 30).forEach(function(s) {
      var key = s[0];
      var data = s[1];
      var statuses = {};
      data.submissions.forEach(function(sub) { statuses[sub.status] = (statuses[sub.status] || 0) + 1; });
      var statusHtml = Object.entries(statuses).map(function(st) {
        var col = statusColor(st[0]);
        return '<span style="font-size:.66rem;color:' + col + ';margin-right:6px">' + st[0] + ': ' + st[1] + '</span>';
      }).join('');
      h += '<tr>';
      h += '<td style="font-family:var(--font-mono);font-size:.72rem;color:var(--text2)">' + esc(key.length > 35 ? key.slice(0, 35) + '...' : key) + '</td>';
      h += '<td><span class="count-badge">' + data.count + '</span></td>';
      h += '<td>' + statusHtml + '</td>';
      h += '<td>' + data.submissions.slice(0, 5).map(function(sub) {
        var urlShort = (sub.url || '').replace(/^https?:\/\/(www\.)?/, '').slice(0, 20);
        return '<a href="#" onclick="jumpToSubmission(\'' + sub.id + '\');return false" style="font-size:.66rem;color:var(--blue);margin-right:4px">' + urlShort + '</a>';
      }).join('') + (data.submissions.length > 5 ? '<span style="font-size:.66rem;color:var(--text3)">+' + (data.submissions.length - 5) + ' more</span>' : '') + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }

  panel.innerHTML = h;
}

function jumpToSubmission(id) {
  switchTab('queue');
  var idx = queue.findIndex(function(q) { return q.id === id; });
  if (idx >= 0) {
    selectItem(idx);
    var listItem = document.querySelectorAll('.list-item')[idx];
    if (listItem) listItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}
</script>
